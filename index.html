<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alina Roșca & Profesional Orchestra</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
color:#fff;
overflow-x:hidden;
background:linear-gradient(135deg,#050507,#120a1f,#1a0f2b);
}

/* 🔥 FUNDAL ANIMAT */
body::before{
content:"";
position:fixed;
inset:0;
z-index:-1;

background:
radial-gradient(circle at 20% 30%, rgba(255,215,120,0.08), transparent 30%),
radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05), transparent 25%),
radial-gradient(circle at 60% 80%, rgba(255,215,120,0.06), transparent 30%);

animation:moveBg 12s ease-in-out infinite alternate;
}

@keyframes moveBg{
0%{transform:translate(0,0) scale(1)}
50%{transform:translate(-20px,20px) scale(1.05)}
100%{transform:translate(20px,-20px) scale(1)}
}

/* 🔝 NAVBAR PREMIUM */
.topbar{
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,215,120,0.2);
}

.logo{
color:#f4dfb8;
font-size:20px;
font-weight:bold;
}

.menu a{
margin:0 10px;
font-size:14px;
position:relative;
}

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:1px;
background:#f4dfb8;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

.menu a:hover{
color:#f4dfb8;
}

/* HERO */
.hero{
position:relative;
height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.hero-content{
position:relative;
z-index:2;
}

h1{
font-size:50px;
margin-bottom:15px;
}

.btn{
padding:12px 20px;
background:linear-gradient(90deg,#f4dfb8,#d5ac68);
color:#000;
border-radius:30px;
display:inline-block;
margin-top:15px;
}

/* SECTIUNI */
.container{
max-width:1100px;
margin:auto;
padding:30px;
}

h2{
margin:40px 0 15px;
color:#f4dfb8;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
margin:10px 0;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(255,215,120,0.2);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* GALERIE WOW */
.gallery{
display:grid;
grid-template-columns:1.5fr 1fr 1fr;
grid-template-rows:250px 250px;
gap:15px;
}

.gallery img{
width:100%;
height:100%;
object-fit:cover;
border-radius:15px;
cursor:pointer;
}

.gallery img:first-child{
grid-row:span 2;
}

.gallery img:hover{
transform:scale(1.03);
}

/* LIGHTBOX */
.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

.lightbox span{
position:absolute;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
}

/* FORM */
input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#f4dfb8,#d5ac68);
border:none;
border-radius:10px;
}

/* MOBILE */
@media(max-width:800px){
.gallery{grid-template-columns:1fr}
h1{font-size:30px}
}
</style>

</head>

<body>

<div class="topbar">
<div class="logo">Alina Roșca Orchestra</div>
<div class="menu">
<a href="#servicii">Servicii</a>
<a href="#media">Media</a>
<a href="#galerie">Galerie</a>
<a href="#contact">Contact</a>
</div>
</div>

<div class="hero">
<img src="1.jpg">
<div class="overlay"></div>

<div class="hero-content">
<h1>Alina Roșca & Profesional Orchestra</h1>
<p>Muzică live premium pentru evenimente</p>
<a class="btn" href="https://wa.me/40723829791">WhatsApp</a>
</div>
</div>

<div class="container">

<h2 id="servicii">Servicii</h2>
<div class="grid">
<div class="card">Formație live</div>
<div class="card">Sonorizare completă</div>
<div class="card">Lumini & efecte</div>
<div class="card">DJ</div>
<div class="card">Artiști invitați</div>
<div class="card">Foto & video</div>
</div>

<h2 id="media">Video</h2>
<iframe height="350" src="https://www.youtube.com/embed/G37C2lHENog"></iframe>

<h2>Spotify</h2>
<iframe height="350" src="https://open.spotify.com/embed/artist/6KnhUZCGsxfoBtpVjv3Ffg"></iframe>

<h2 id="galerie">Galerie</h2>
<div class="gallery">
<img src="1.jpg" onclick="openLightbox(this.src)">
<img src="2.jpg" onclick="openLightbox(this.src)">
<img src="3.jpg" onclick="openLightbox(this.src)">
<img src="4.jpg" onclick="openLightbox(this.src)">
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<span>&times;</span>
<img id="lightbox-img">
</div>

<h2>Contact</h2>
<form action="https://formsubmit.co/roscaiulian91@gmail.com" method="POST">
<input placeholder="Nume">
<input placeholder="Telefon">
<textarea placeholder="Mesaj"></textarea>
<button>Trimite</button>
</form>

</div>

<script>
function openLightbox(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
