<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alina Ro╚آca & Profesional Orchestra</title>
  <meta name="description" content="Muzic─â live premium pentru nun╚ؤi, botezuri ╚آi evenimente private." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg:#09070d;
      --bg2:#140f1d;
      --bg3:#1b1326;
      --gold:#e3c38b;
      --gold-soft:#f4dfb8;
      --text:rgba(255,255,255,0.88);
      --muted:rgba(255,255,255,0.66);
      --line:rgba(227,195,139,0.18);
      --card:rgba(255,255,255,0.05);
      --shadow:0 18px 40px rgba(0,0,0,0.22);
      --radius:24px;
    }

    html { scroll-behavior: smooth; }

    body{
      font-family: Arial, sans-serif;
      color:#fff;
      line-height:1.7;
      min-height:100vh;
      position:relative;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 10% 15%, rgba(227,195,139,0.10), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(255,255,255,0.04), transparent 18%),
        radial-gradient(circle at 50% 85%, rgba(227,195,139,0.06), transparent 22%),
        linear-gradient(135deg, var(--bg), var(--bg2), var(--bg3));
    }

    body::before{
      content:"ظآز  ظآس  ظآش  ظآر    ظآز  ظآس  ظآش  ظآر    ظآز  ظآس  ظآش  ظآر";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-2;
      font-size:90px;
      letter-spacing:80px;
      line-height:2.3;
      color:rgba(244,223,184,0.035);
      white-space:pre-wrap;
      padding:40px 50px;
      animation: floatMusic 22s ease-in-out infinite alternate;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-3;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 15%),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 84px,
          rgba(227,195,139,0.015) 85px,
          transparent 86px
        );
    }

    @keyframes floatMusic{
      0%{ transform:translateY(0) translateX(0); }
      50%{ transform:translateY(-18px) translateX(10px); }
      100%{ transform:translateY(14px) translateX(-8px); }
    }

    a{ color:inherit; text-decoration:none; }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(12,9,17,0.82);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
      box-shadow:0 8px 24px rgba(0,0,0,0.18);
    }

    .topbar-inner{
      max-width:1180px;
      margin:auto;
      padding:10px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:1px;
      min-width:0;
    }

    .brand-title{
      color:var(--gold-soft);
      font-size:18px;
      font-weight:700;
      line-height:1.1;
    }

    .brand-sub{
      color:rgba(255,255,255,0.42);
      font-size:10px;
      letter-spacing:1.3px;
      text-transform:uppercase;
      line-height:1.1;
    }

    .menu{
      display:flex;
      gap:10px;
      font-size:12px;
      color:rgba(255,255,255,0.8);
      flex-wrap:wrap;
      align-items:center;
    }

    .menu a{
      position:relative;
      padding:5px 6px;
      transition:.3s ease;
      letter-spacing:0.15px;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
    }

    .menu a::after{
      content:"";
      position:absolute;
      left:8px;
      right:8px;
      bottom:1px;
      height:1px;
      transform:scaleX(0);
      transform-origin:left;
      background:linear-gradient(90deg,#f4dfb8,#d4ac69);
      transition:.35s ease;
    }

    .menu a::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:999px;
      background:radial-gradient(circle, rgba(244,223,184,0.10), transparent 75%);
      opacity:0;
      transform:scale(0.9);
      transition:.3s ease;
      z-index:-1;
    }

    .menu a:hover{
      color:var(--gold-soft);
      transform:translateY(-1px);
    }

    .menu a:hover::after,
    .menu a.active::after{
      transform:scaleX(1);
    }

    .menu a:hover::before{
      opacity:1;
      transform:scale(1);
    }

    .menu a.active{
      color:var(--gold-soft);
    }

    .top-actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn-top,
    .btn-top-outline,
    .btn-primary,
    .btn-secondary{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:9px 12px;
      border-radius:999px;
      font-weight:700;
      transition:.25s ease;
      white-space:nowrap;
      font-size:12px;
      line-height:1;
    }

    .btn-top,
    .btn-primary{
      background:linear-gradient(90deg,#f4dfb8,#d4ac69);
      color:#18120d;
      box-shadow:0 10px 24px rgba(227,195,139,0.14);
      position:relative;
      overflow:hidden;
    }

    .btn-top::before,
    .btn-primary::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:100%;
      height:100%;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.45), transparent);
      transition:.6s ease;
    }

    .btn-top:hover::before,
    .btn-primary:hover::before{
      left:120%;
    }

    .btn-top-outline,
    .btn-secondary{
      border:1px solid var(--line);
      background:rgba(255,255,255,0.04);
      color:#fff;
    }

    .btn-top:hover,
    .btn-top-outline:hover,
    .btn-primary:hover,
    .btn-secondary:hover{
      transform:translateY(-2px) scale(1.02);
    }

    .container{
      max-width:1180px;
      margin:auto;
      padding:22px;
    }

    .hero{
      position:relative;
      min-height:76vh;
      border-radius:32px;
      overflow:hidden;
      margin-top:18px;
      display:flex;
      align-items:flex-end;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .hero-bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to right, rgba(9,9,12,0.84), rgba(9,9,12,0.34)),
        linear-gradient(to top, rgba(9,9,12,0.78), transparent 42%);
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:780px;
      padding:48px;
    }
